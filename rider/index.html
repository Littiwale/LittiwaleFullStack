<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Littiwale Rider Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <script>
        (function() {
            const role = localStorage.getItem('littiwale_role');
            if (!role) { window.location.href = '/login.html'; return; }
            if (role === 'rider' || role === 'admin' || role === 'manager') return;
            window.location.href = '/customer/index.html';
        })();
    </script>
    <style>
        /* ── Rider Panel Scoped Styles ── */
        body { background: #0d0f14; font-family: 'Poppins', sans-serif; color: #fff; margin: 0; }

        .rider-header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            height: 70px;
            background: #13161e;
            border-bottom: 1px solid #252830;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
        }
        .rider-logo { display: flex; align-items: center; gap: 10px; }
        .rider-logo img { height: 32px; }
        .rider-logo-text { display: flex; flex-direction: column; line-height: 1.1; }
        .rider-logo-brand { font-weight: 900; font-size: 15px; color: #F5A800; letter-spacing: 1px; }
        .rider-logo-sub { font-size: 10px; color: #7a8098; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }

        .rider-main { padding: 90px 16px 100px; max-width: 600px; margin: 0 auto; }

        .rider-section-title {
            font-size: 13px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 2px; color: #7a8098; margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .rider-section-title .count-pill {
            background: #F5A800; color: #000; font-size: 10px; font-weight: 900;
            padding: 2px 8px; border-radius: 20px;
        }

        /* Order Card */
        .rider-card {
            background: #13161e;
            border: 1px solid #252830;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        .rider-card:hover { border-color: #F5A800; }
        .rider-card.current-delivery { border-color: #10B981; box-shadow: 0 0 0 1px #10B981; }
        .rider-card.current-delivery .delivery-glow {
            position: absolute; inset: 0; border-radius: 20px;
            background: radial-gradient(ellipse at top, rgba(16,185,129,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .order-meta { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
        .order-id { font-size: 10px; font-weight: 900; color: #7a8098; letter-spacing: 2px; text-transform: uppercase; }
        .order-time { font-size: 10px; color: #5a6280; font-weight: 600; }
        .order-customer-name { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 2px; }
        .order-total { font-size: 20px; font-weight: 900; color: #F5A800; }

        .order-info-row {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(255,255,255,0.03); border: 1px solid #252830;
            border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
        }
        .order-info-label { font-size: 9px; font-weight: 800; color: #7a8098; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
        .order-info-value { font-size: 13px; font-weight: 700; color: #e0e0e0; }
        .order-action-icon {
            width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 18px; text-decoration: none; flex-shrink: 0;
            transition: transform 0.15s; border: none; cursor: pointer;
        }
        .order-action-icon:active { transform: scale(0.92); }
        .icon-call { background: #10B981; }
        .icon-map  { background: #2563EB; }

        .items-summary {
            font-size: 12px; color: #7a8098; font-weight: 500; margin: 10px 0;
            border-top: 1px solid #252830; padding-top: 10px;
        }

        .cod-tag {
            display: inline-block; font-size: 11px; font-weight: 800; padding: 4px 10px;
            border-radius: 8px; margin-top: 6px;
        }
        .cod-tag.collect { background: rgba(249,115,22,0.15); color: #f97316; }
        .cod-tag.paid    { background: rgba(16,185,129,0.15); color: #10B981; }

        /* CTA Buttons */
        .btn-pickup {
            width: 100%; padding: 16px; background: #F5A800; color: #000;
            border: none; border-radius: 14px; font-size: 14px; font-weight: 900;
            letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
            margin-top: 14px; transition: opacity 0.2s, transform 0.1s;
        }
        .btn-pickup:active { transform: scale(0.98); opacity: 0.9; }

        .btn-delivered {
            width: 100%; padding: 16px; background: #10B981; color: #fff;
            border: none; border-radius: 14px; font-size: 14px; font-weight: 900;
            letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
            margin-top: 14px; transition: opacity 0.2s, transform 0.1s;
        }
        .btn-delivered:active { transform: scale(0.98); opacity: 0.9; }

        /* Empty state */
        .rider-empty {
            text-align: center; padding: 40px 20px; color: #5a6280;
        }
        .rider-empty .empty-emoji { font-size: 40px; margin-bottom: 12px; }
        .rider-empty p { font-size: 13px; font-weight: 600; }

        /* Section divider */
        .section-gap { margin-bottom: 32px; }

        /* Bottom Nav */
        .rider-bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #13161e; border-top: 1px solid #252830;
            display: flex; justify-content: space-around; align-items: center;
            height: 64px; z-index: 100;
        }
        .bnav-item {
            display: flex; flex-direction: column; align-items: center;
            gap: 3px; font-size: 9px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; color: #5a6280; cursor: pointer; padding: 8px 20px;
            border-radius: 12px; transition: color 0.15s;
        }
        .bnav-item.active { color: #F5A800; }
        .bnav-icon { font-size: 20px; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="rider-header">
        <div class="rider-logo">
            <img src="/images/logo.png" alt="Littiwale" onerror="this.style.display='none'">
            <div class="rider-logo-text">
                <span class="rider-logo-brand">LITTIWALE</span>
                <span class="rider-logo-sub">Rider Panel</span>
            </div>
        </div>

        <!-- Avatar Dropdown (role-aware, wired by rider.js) -->
        <div class="lw-profile-wrap">
            <button class="lw-avatar-btn" id="rider-avatar-trigger" aria-haspopup="true" aria-expanded="false">R</button>
            <div class="lw-dropdown" id="rider-profile-dropdown" role="menu">
                <div class="lw-dropdown-header">
                    <p id="rider-dd-name">Rider</p>
                    <span id="rider-dd-role">Delivery Partner</span>
                </div>
                <!-- Nav items injected dynamically by rider.js based on role -->
                <button class="lw-dropdown-item" id="rider-dd-storefront">🛒 Go to Storefront</button>
                <div class="lw-dropdown-divider"></div>
                <button class="lw-dropdown-item danger" id="rider-dd-logout">🚪 Logout</button>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="rider-main">

        <!-- SECTION 1: PENDING PICKUPS -->
        <div class="section-gap">
            <div class="rider-section-title">
                Pending Pickups 📦
                <span class="count-pill" id="pending-count">0</span>
            </div>
            <div id="pending-pickups-list">
                <div class="rider-empty">
                    <div class="empty-emoji">🎉</div>
                    <p>No new pickups yet</p>
                </div>
            </div>
        </div>

        <!-- SECTION 2: CURRENT DELIVERY -->
        <div class="section-gap">
            <div class="rider-section-title">
                Current Delivery 🛵
            </div>
            <div id="current-delivery-container">
                <div class="rider-empty">
                    <div class="empty-emoji">🛵</div>
                    <p>No active delivery</p>
                </div>
            </div>
        </div>

    </main>

    <!-- BOTTOM NAV -->
    <nav class="rider-bottom-nav">
        <div class="bnav-item active">
            <span class="bnav-icon">📦</span>
            Jobs
        </div>
        <div class="bnav-item" id="bnav-profile">
            <span class="bnav-icon">👤</span>
            Profile
        </div>
    </nav>

    <!-- Notification Sound -->
    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script type="module" src="/src/rider.js"></script>
</body>
</html>
