<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Dashboard - Littiwale</title>
    <meta property="og:title" content="Littiwale Rider Panel">
    <meta property="og:description" content="Littiwale delivery partner panel for managing deliveries and earnings.">
    <meta property="og:image" content="https://firebasestorage.googleapis.com/v0/b/littiwale-ordering-system.appspot.com/o/images%2Flogo.png?alt=media">
    <meta property="og:type" content="website">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#080b12">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="/src/rider.css">
    <link rel="stylesheet" href="/src/panel-tokens.css">
</head>
<body class="rider-app">

    <!-- HEADER -->
    <header class="rider-header">
        <div class="rider-logo">
            <img src="/images/logo.png" alt="Littiwale" onerror="this.style.display='none'">
            <div class="rider-logo-text">
                <span class="rider-logo-brand">LITTIWALE</span>
                <span class="rider-logo-sub">Rider Panel</span>
            </div>
        </div>

        <div id="rider-today-count" style="font-size:11px;color:#F5A800;font-weight:900;font-family:'Space Mono',monospace;letter-spacing:1px;"></div>

        <button id="theme-toggle" type="button" data-theme-toggle class="theme-toggle-btn" aria-label="Toggle dark mode">🌙</button>
        <div class="lw-profile-wrap">
            <button class="lw-avatar-btn" id="rider-avatar-trigger" aria-haspopup="true" aria-expanded="false">R</button>
            <div class="lw-dropdown" id="rider-profile-dropdown" role="menu">
                <div class="lw-dropdown-header">
                    <p id="rider-dd-name">Rider</p>
                    <span id="rider-dd-role">Delivery Partner</span>
                </div>
                <button class="lw-dropdown-item" id="rider-dd-storefront">🛒 Go to Storefront</button>
                <div class="lw-dropdown-divider"></div>
                <button class="lw-dropdown-item danger" id="rider-dd-logout">🚪 Logout</button>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="rider-main">

        <!-- EARNINGS + ONLINE TOGGLE -->
        <div class="nd-status-bar">
            <div class="nd-status-bar-glow"></div>
            <div>
                <div class="nd-earn-label">Today's Earnings</div>
                <div class="nd-earn-val" id="rider-earnings">₹0</div>
                <div class="nd-earn-meta" id="rider-deliveries">0 deliveries</div>
            </div>
            <div class="nd-toggle-wrap">
                <div class="nd-online-tag offline" id="rider-status-text">● OFFLINE</div>
                <label style="position:relative;display:inline-block;width:52px;height:28px;margin-top:8px;">
                    <input type="checkbox" id="rider-status-toggle" style="opacity:0;width:0;height:0;">
                    <span id="rider-toggle-slider" style="position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ef4444;transition:.4s;border-radius:34px;">
                        <span id="rider-toggle-knob" style="position:absolute;height:20px;width:20px;left:4px;bottom:4px;background:white;transition:.4s;border-radius:50%;"></span>
                    </span>
                </label>
            </div>
        </div>

        <!-- PENDING PICKUPS -->
        <div class="section-gap">
            <div class="rider-section-title">
                Pending Pickups 📦
                <span class="count-pill" id="pending-count">0</span>
            </div>
            <div id="pending-pickups-list">
                <div class="rider-empty">
                    <div class="empty-emoji">🎉</div>
                    <p>No new pickups yet</p>
                </div>
            </div>
        </div>

        <!-- CURRENT DELIVERY -->
        <div class="section-gap">
            <div class="rider-section-title">
                Current Delivery 🛵
            </div>
            <div id="current-delivery-container">
                <div class="rider-empty">
                    <div class="empty-emoji">🛵</div>
                    <p>No active delivery</p>
                </div>
            </div>
        </div>

    </main>

    <!-- BOTTOM NAV -->
    <nav class="rider-bottom-nav">
        <div class="bnav-item active">
            <span class="bnav-icon">📦</span>
            Jobs
        </div>
        <div class="bnav-item" id="bnav-profile">
            <span class="bnav-icon">👤</span>
            Profile
        </div>
    </nav>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script type="module" src="/src/theme.js"></script>
    <script type="module" src="/src/rider.js"></script>
</body>
</html>
