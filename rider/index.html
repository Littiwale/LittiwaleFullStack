<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Dashboard - Littiwale</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0d0d0d">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="/src/rider.css">
    <link rel="stylesheet" href="/src/panel-tokens.css">
</head>
<body class="rider-app">

    <!-- HEADER -->
    <header class="rider-header">
        <div class="rider-logo">
            <img src="/images/logo.png" alt="Littiwale" onerror="this.style.display='none'">
            <div class="rider-logo-text">
                <span class="rider-logo-brand">LITTIWALE</span>
                <span class="rider-logo-sub">Rider Panel</span>
            </div>
        </div>

        <!-- Delivery Count Display -->
        <div id="rider-today-count" style="font-size:12px;color:#F5A800;font-weight:700;"></div>

        <!-- Avatar Dropdown (role-aware, wired by rider.js) -->
        <button id="theme-toggle" type="button" data-theme-toggle class="theme-toggle-btn" aria-label="Toggle dark mode">🌙</button>
        <div class="lw-profile-wrap">
            <button class="lw-avatar-btn" id="rider-avatar-trigger" aria-haspopup="true" aria-expanded="false">R</button>
            <div class="lw-dropdown" id="rider-profile-dropdown" role="menu">
                <div class="lw-dropdown-header">
                    <p id="rider-dd-name">Rider</p>
                    <span id="rider-dd-role">Delivery Partner</span>
                </div>
                <!-- Nav items injected dynamically by rider.js based on role -->
                <button class="lw-dropdown-item" id="rider-dd-storefront">🛒 Go to Storefront</button>
                <div class="lw-dropdown-divider"></div>
                <button class="lw-dropdown-item danger" id="rider-dd-logout">🚪 Logout</button>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="rider-main">

        <!-- STATUS TOGGLE & EARNINGS (Phase 4) -->
        <div style="background:#13161e; border:1px solid #252830; border-radius:12px; padding:16px; margin-bottom:24px; display:flex; justify-content:space-between; align-items:center;">
            <div>
                <p style="font-size:11px; font-weight:800; color:#7a8098; text-transform:uppercase;">Today's Earnings</p>
                <p style="font-size:20px; font-weight:900; color:#10B981;" id="rider-earnings">₹0</p>
                <p style="font-size:11px; color:#9ca3af;" id="rider-deliveries">0 deliveries</p>
            </div>
            <div style="text-align:right;">
                <p style="font-size:11px; font-weight:800; color:#7a8098; text-transform:uppercase; margin-bottom:6px;" id="rider-status-text">Offline</p>
                <label style="position:relative; display:inline-block; width:52px; height:28px;">
                    <input type="checkbox" id="rider-status-toggle" style="opacity:0; width:0; height:0;">
                    <span style="position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background-color:#ef4444; transition:.4s; border-radius:34px;" id="rider-toggle-slider">
                        <span style="position:absolute; content:''; height:20px; width:20px; left:4px; bottom:4px; background-color:white; transition:.4s; border-radius:50%;" id="rider-toggle-knob"></span>
                    </span>
                </label>
            </div>
        </div>

        <!-- SECTION 1: PENDING PICKUPS -->
        <div class="section-gap">
            <div class="rider-section-title">
                Pending Pickups 📦
                <span class="count-pill" id="pending-count">0</span>
            </div>
            <div id="pending-pickups-list">
                <div class="rider-empty">
                    <div class="empty-emoji">🎉</div>
                    <p>No new pickups yet</p>
                </div>
            </div>
        </div>

        <!-- SECTION 2: CURRENT DELIVERY -->
        <div class="section-gap">
            <div class="rider-section-title">
                Current Delivery 🛵
            </div>
            <div id="current-delivery-container">
                <div class="rider-empty">
                    <div class="empty-emoji">🛵</div>
                    <p>No active delivery</p>
                </div>
            </div>
        </div>

    </main>

    <!-- BOTTOM NAV -->
    <nav class="rider-bottom-nav">
        <div class="bnav-item active">
            <span class="bnav-icon">📦</span>
            Jobs
        </div>
        <div class="bnav-item" id="bnav-profile">
            <span class="bnav-icon">👤</span>
            Profile
        </div>
    </nav>

    <!-- Notification Sound -->
    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script type="module" src="/src/theme.js"></script>
    <script type="module" src="/src/rider.js"></script>
</body>
</html>
