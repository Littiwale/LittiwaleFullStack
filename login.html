<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Littiwale – Taste of Desi Swag</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0d0d0d">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <link rel="stylesheet" href="./src/style.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold: #F5A800;
            --gold-dark: #d48f00;
            --dark: #0d0f14;
            --card-bg: #13161e;
            --card-border: #252830;
            --input-bg: #1c2030;
            --text-muted: #7a8098;
            --text-light: #c8cfe0;
            --white: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto; /* Allow scroll if needed */
            background: #0d0f14;
        }

        /* ── MAIN CONTAINER ── */
        #auth-container {
            display: flex;
            align-items: stretch; /* Ensure panels match height */
            width: 100%;
            min-height: 100vh;
            background: var(--card-bg);
            position: relative;
            z-index: 10;
        }

        /* ── LEFT PANEL ── */
        .left {
            width: 50%;
            min-height: 100%;
            position: relative;
            overflow: hidden;
            display: none; /* Hide on small screens */
            background: #080b11;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
        }

        @media (min-width: 768px) {
            .left { display: block; }
        }

        /* Signup side movement */
        body.signup-mode .left {
            transform: translateX(100%);
        }

        .mascot-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: 
                radial-gradient(ellipse at 50% 50%, rgba(210,110,20,0.2) 0%, transparent 70%),
                linear-gradient(160deg, #120b04 0%, #0d0900 100%);
            animation: float 3.5s ease-in-out infinite;
            transition: opacity 0.7s ease, transform 0.7s ease;
        }

        .hero-img-signup {
            opacity: 0;
            transform: scale(1.05);
        }

        .hero-img-login {
            opacity: 1;
            transform: scale(1);
        }

        body.signup-mode .hero-img-login { opacity: 0; transform: scale(0.95); }
        body.signup-mode .hero-img-signup { opacity: 1; transform: scale(1); }

        @keyframes float {
            0%,100% { transform: translateY(0px) rotate(-1deg); }
            50%      { transform: translateY(-15px) rotate(1deg); }
        }

        /* vignette to blend */
        .left::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, transparent 60%, rgba(13,15,20,0.95) 100%);
            pointer-events: none;
        }

        /* ── LOGO OVERLAY ── */
        .logo-overlay {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: fadeDown .7s ease both;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(245,168,0,0.3));
        }

        .logo-name {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 900;
            color: var(--white);
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        /* ── RIGHT PANEL ── */
        .right {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 32px;
            background: var(--card-bg);
            position: relative;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
            overflow-y: auto;
        }
        
        @media (min-width: 850px) {
            .right { width: 50%; }
        }

        body.signup-mode .right {
            transform: translateX(-100%);
        }

        .card-inner {
            width: 100%;
            max-width: 380px;
            position: relative;
        }

        /* Loader */
        #auth-loader {
            position: absolute;
            inset: 0;
            background: rgba(13, 22, 30, 0.9);
            backdrop-filter: blur(4px);
            z-index: 50;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--card-border);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* tabs */
        .tabs { display: flex; gap: 8px; margin-bottom: 28px; }

        .tab {
            padding: 6px 18px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            cursor: pointer;
            border: 1.5px solid var(--card-border);
            transition: all .2s;
            color: var(--text-muted);
        }

        .tab.active { background: var(--gold); color: #000; border-color: var(--gold); }
        .tab-inactive:hover { border-color: var(--gold); color: var(--gold); }

        .card h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 6px;
            line-height: 1.2;
        }

        .card .sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .form-container {
            transition: all 0.4s ease;
        }

        .form-hide {
            display: none;
            opacity: 0;
            transform: translateY(10px);
        }

        .form-show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .field-group { margin-bottom: 12px; position: relative; }
        
        .field-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            margin-left: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            background: var(--input-bg);
            border: 1.5px solid var(--card-border);
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            color: var(--white);
            outline: none;
            transition: all .2s;
        }

        input::placeholder { color: #4a4e5d; }
        input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(245,168,0,0.1); }

        .btn-luxury {
            width: 100%;
            padding: 16px;
            border-radius: 10px;
            border: none;
            background: var(--gold);
            color: #000;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 8px;
            transition: all .2s;
            box-shadow: 0 4px 20px rgba(245,168,0,0.25);
        }

        .btn-luxury:hover { background: var(--gold-dark); transform: translateY(-1px); box-shadow: 0 8px 28px rgba(245,168,0,0.35); }
        .btn-luxury:active { transform: translateY(1px); }

        .divider {
            text-align: center;
            color: var(--text-muted);
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 24px 0;
            position: relative;
            background: transparent;
            height: auto;
            width: auto;
        }
        .divider::before, .divider::after { content:''; position:absolute; top:50%; width:38%; height:1px; background:var(--card-border); }
        .divider::before { left:0; }
        .divider::after  { right:0; }

        .btn-social {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1.5px solid var(--card-border);
            background: rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-light);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            margin-bottom: 12px;
        }
        .btn-social:hover { background: rgba(255,255,255,0.08); border-color: var(--text-muted); }

        .btn-google svg { width: 18px; height: 18px; }

        .register-link { text-align: center; font-size: 13px; color: var(--text-muted); margin-top: 24px; }
        .register-link button { 
            background: none; border: none; color: var(--gold); 
            font-weight: 700; cursor: pointer; font-family: 'Poppins', sans-serif;
            margin-left: 4px;
        }
        .register-link button:hover { text-decoration: underline; }

        .error-msg {
            color: #ff4757;
            font-size: 11px;
            font-weight: 500;
            text-align: center;
            margin-top: 8px;
            min-height: 16px;
        }

        @keyframes fadeUp   { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body class="bg-primary">

    <div id="auth-container">
        
        <div class="logo-overlay">
            <div class="logo-icon">
                <img src="/images/logo.png" alt="Logo">
            </div>
        </div>

        <!-- LEFT PANEL — Mascot (Matches Card Height) -->
        <div class="left">
            <img class="mascot-img hero-img-login" src="/images/login_panda.png" alt="Mascot Login">
            <img class="mascot-img hero-img-signup" src="/images/signup_panda.png" alt="Mascot Signup">
        </div>

        <!-- RIGHT PANEL — Auth Interface -->
        <div class="right">
            <div class="card-inner">
                
                <!-- Loader (Hidden by default) -->
                <div id="auth-loader" class="flex hidden">
                    <div class="spinner"></div>
                    <p style="color: var(--gold); font-size: 10px; margin-top: 12px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;">Taste Loading...</p>
                </div>

                <div class="tabs">
                    <div id="tab-login" class="tab active">Login</div>
                    <div id="tab-signup" class="tab tab-inactive">Signup</div>
                </div>

                <!-- LOGIN FORM -->
                <div id="login-form-side" class="form-container form-show">
                    <h1>Bhookh Lagi Kya? 🔥</h1>
                    <p class="sub">Apna account kholo, taste ka swag shuru karo</p>

                    <form id="login-form">
                        <div class="field-group">
                            <label class="field-label">Email / Username</label>
                            <input type="text" id="login-identifier" placeholder="Enter your credentials" required>
                        </div>
                        <div class="field-group">
                            <label class="field-label">Password</label>
                            <input type="password" id="login-password" placeholder="••••••••••••" required>
                        </div>

                        <div id="login-error" class="error-msg"></div>

                        <button type="submit" id="login-submit-btn" class="btn-luxury">Sign In</button>
                        
                        <div class="divider">or</div>

                        <button type="button" id="google-login-btn" class="btn-social btn-google">
                            <svg viewBox="0 0 24 24">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                            </svg>
                            Continue with Google
                        </button>

                        <button type="button" id="guest-btn" class="btn-social">Continue as Guest</button>
                    </form>

                    <div class="register-link">Don't have an account? <button type="button" id="toggle-to-signup">Register now</button></div>
                </div>

                <!-- SIGNUP FORM -->
                <div id="signup-form-side" class="form-container form-hide">
                    <h1>Littiwale ke apne ho jao 🔥</h1>
                    <p class="sub">Taste of swag is just a few steps away</p>

                    <form id="signup-form">
                        <div style="display: flex; gap: 12px;">
                            <div class="field-group" style="flex:1">
                                <label class="field-label">Name</label>
                                <input type="text" id="signup-name" placeholder="Name" required>
                            </div>
                            <div class="field-group" style="flex:1">
                                <label class="field-label">Username</label>
                                <input type="text" id="signup-username" placeholder="Handle" required>
                            </div>
                        </div>

                        <div class="field-group">
                            <label class="field-label">Email Address</label>
                            <input type="email" id="signup-email" placeholder="email@example.com" required>
                        </div>

                        <div class="field-group">
                            <label class="field-label">Phone Number</label>
                            <input type="tel" id="signup-phone" placeholder="10-digit mobile" required>
                        </div>

                        <div class="field-group">
                            <label class="field-label">Password</label>
                            <input type="password" id="signup-password" placeholder="••••••••••••" required>
                        </div>

                        <div id="signup-error" class="error-msg"></div>

                        <button type="submit" class="btn-luxury">Join Now</button>
                        
                        <div class="divider">or</div>

                        <button type="button" id="google-signup-btn" class="btn-social btn-google">
                            <svg viewBox="0 0 24 24">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                            </svg>
                            Continue with Google
                        </button>
                    </form>

                    <div class="register-link">Already have an account? <button type="button" id="toggle-to-login">Log in</button></div>
                </div>

                <!-- COMPLETION FORM -->
                <div id="completion-form-side" class="form-container form-hide">
                    <h1>Add Litti Swag</h1>
                    <p class="sub">Complete your profile for a better taste</p>

                    <form id="completion-form">
                        <div class="field-group">
                            <label class="field-label">Choose Handle (Username)</label>
                            <input type="text" id="complete-username" placeholder="username" required>
                        </div>
                        <div class="field-group">
                            <label class="field-label">Mobile Number</label>
                            <input type="tel" id="complete-phone" placeholder="10-digit phone" required>
                        </div>

                        <div id="completion-error" class="error-msg"></div>

                        <button type="submit" class="btn-luxury">Save & Continue</button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script type="module" src="./src/login.js"></script>
</body>
</html>
